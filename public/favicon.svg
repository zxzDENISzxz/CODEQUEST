<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Стержень антенны -->
  <rect x="26" y="2" width="3" height="8" rx="1.5" fill="#475569"/>
  <!-- Огонёк антенны -->
  <circle cx="27.5" cy="2" r="3.5" fill="#fbbf24"/>
  <circle cx="27.5" cy="2" r="2" fill="#fef08a"/>

  <!-- Корпус головы -->
  <rect x="7" y="10" width="38" height="26" rx="6" fill="#1e293b"/>
  <rect x="7" y="10" width="38" height="26" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Экран-лицо -->
  <rect x="11" y="14" width="30" height="18" rx="3.5" fill="#0f172a"/>

  <!-- Левый глаз -->
  <circle cx="21" cy="21" r="4.5" fill="#1e40af"/>
  <circle cx="21" cy="21" r="2.8" fill="#3b82f6"/>
  <circle cx="21" cy="21" r="1.4" fill="#bae6fd"/>
  <circle cx="19.8" cy="19.8" r="0.8" fill="white" opacity="0.7"/>

  <!-- Правый глаз -->
  <circle cx="33" cy="21" r="4.5" fill="#1e40af"/>
  <circle cx="33" cy="21" r="2.8" fill="#3b82f6"/>
  <circle cx="33" cy="21" r="1.4" fill="#bae6fd"/>
  <circle cx="31.8" cy="19.8" r="0.8" fill="white" opacity="0.7"/>

  <!-- Решётка-динамик -->
  <rect x="18" y="28" width="16" height="4" rx="1.5" fill="#0f172a"/>
  <line x1="20" y1="28" x2="20" y2="32" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="23" y1="28" x2="23" y2="32" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="26" y1="28" x2="26" y2="32" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="29" y1="28" x2="29" y2="32" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="32" y1="28" x2="32" y2="32" stroke="#3b82f6" stroke-width="1.2"/>

  <!-- Боковые уши -->
  <rect x="2" y="16" width="5" height="9" rx="2" fill="#334155"/>
  <rect x="49" y="16" width="5" height="9" rx="2" fill="#334155"/>
  <!-- Зелёный индикатор -->
  <circle cx="4.5" cy="20.5" r="1.8" fill="#22c55e"/>

  <!-- Синяя полоска снизу корпуса -->
  <rect x="11" y="34" width="30" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

  <!-- Нижняя подставка -->
  <rect x="18" y="37" width="16" height="9" rx="3.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="21" y="40" width="4" height="3" rx="1" fill="#334155"/>
  <rect x="27" y="40" width="4" height="3" rx="1" fill="#334155"/>
</svg>
